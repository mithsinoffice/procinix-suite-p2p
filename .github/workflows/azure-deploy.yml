name: Deploy Procinix S2P to Azure

on:
  push:
    branches:
      - procinix-v2
  workflow_dispatch:

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install root dependencies (with dev for Vite build)
        run: npm ci

      - name: Build frontend
        run: npm run build
        env:
          NODE_ENV: production
          VITE_API_URL: https://procinix-s2pdemo.procinix.ai

      - name: Prune root to production dependencies only
        run: npm prune --omit=dev

      - name: Install server dependencies (with dev for tsc)
        run: cd server && npm ci

      - name: Compile server TypeScript
        run: cd server && npx tsc

      - name: Prune server to production dependencies only
        run: cd server && npm prune --omit=dev

      - name: Prepare deployment package
        run: |
          mkdir -p deploy_pkg/server
          cp -r dist                  deploy_pkg/dist
          cp -r server/dist           deploy_pkg/server/dist
          cp -r server/node_modules   deploy_pkg/server/node_modules
          cp    server/package.json   deploy_pkg/server/package.json
          cp -r node_modules          deploy_pkg/node_modules
          cp    package.json          deploy_pkg/package.json

      - name: Zip deployment package
        run: |
          cd deploy_pkg
          zip -r ../deploy.zip . \
            --exclude "*/node_modules/.cache/*" \
            --exclude "*/.cache/*"
          cd ..
          echo "Package size: $(du -sh deploy.zip | cut -f1)"

      - name: Deploy to Azure Web App
        uses: azure/webapps-deploy@v3
        with:
          app-name: procinix-s2p
          publish-profile: ${{ secrets.AZURE_WEBAPP_PUBLISH_PROFILE }}
          package: deploy.zip