name: Deploy Procinix S2P to Azure

on:
  push:
    branches:
      - procinix-v2
  workflow_dispatch:

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install root dependencies
        run: npm ci

      - name: Install server dependencies
        run: cd server && npm ci

      - name: Build frontend
        run: npm run build
        env:
          NODE_ENV: production
          VITE_API_URL: https://procinix-s2p-ddh8bhhjbgcxbga2.southindia-01.azurewebsites.net

      - name: Create startup script
        run: |
          cat > startup.sh << 'STARTUP'
          #!/bin/bash
          cd /home/site/wwwroot
          node server/src/server.js
          STARTUP
          chmod +x startup.sh

      - name: Deploy to Azure Web App
        uses: azure/webapps-deploy@v3
        with:
          app-name: procinix-s2p
          publish-profile: ${{ secrets.AZURE_WEBAPP_PUBLISH_PROFILE }}
          package: .