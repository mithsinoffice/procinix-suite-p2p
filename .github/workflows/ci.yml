name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  ci:
    name: Lint · Format · Typecheck · Test · Build
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci --legacy-peer-deps --ignore-scripts

      - name: Lint (errors only; warnings allowed)
        run: npm run lint -- --max-warnings=9999

      - name: Format check
        run: npm run format:check

      # TODO(F4): remove continue-on-error once the 7 pre-existing TS errors are fixed
      - name: Type check
        run: npm run typecheck
        continue-on-error: true

      - name: Test
        run: npm test

      - name: Build
        run: npm run build
